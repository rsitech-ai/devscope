name: Bug report
description: Report a reproducible DevScope defect without sensitive process data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: >-
        Do not report security vulnerabilities here. Redact usernames, commands,
        process arguments, project names, credentials, and private paths.
  - type: input
    id: version
    attributes:
      label: DevScope version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: macOS and Mac architecture
      placeholder: macOS 15.x, Apple silicon
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Use only fixture processes or automation data you can safely modify.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets and sensitive process, command, and path data.
          required: true
        - label: This is not a vulnerability report.
          required: true
