name: Feature request
description: Propose a focused improvement to DevScope.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem is not handled today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the result rather than a required implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Security, privacy, and destructive-action impact
      description: Note any new data access, process control, automation mutation, or network behavior.
    validations:
      required: true
  - type: dropdown
    id: distribution
    attributes:
      label: Distribution surface
      options:
        - Full-feature direct download
        - Sandbox-compatible build
        - Both, with explicitly different behavior
        - Not applicable
    validations:
      required: true
