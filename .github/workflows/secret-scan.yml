name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Full-history Gitleaks scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download checksum-pinned Gitleaks CLI
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          echo "$GITLEAKS_LINUX_X64_SHA256  $archive" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version

      - name: Scan complete repository history
        run: |
          "$RUNNER_TEMP/gitleaks" git --redact --no-banner --no-color .
